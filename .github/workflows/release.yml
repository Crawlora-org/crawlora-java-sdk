name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"   # e.g. 1.5.0-sdk.1
          pom_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          java_version="$(grep -oP 'VERSION = "\K[^"]+' src/main/java/net/crawlora/Version.java)"
          if [ "$pom_version" != "$tag" ]; then
            echo "tag $tag != pom version $pom_version" >&2
            exit 1
          fi
          if [ "$java_version" != "$tag" ]; then
            echo "tag $tag != Version.java $java_version" >&2
            exit 1
          fi
      - name: Regenerate and verify
        run: |
          python3 scripts/generate.py
          git diff --exit-code
      - name: Test
        run: mvn -B test
      - name: Publish to Maven Central
        run: mvn -B -P release -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
