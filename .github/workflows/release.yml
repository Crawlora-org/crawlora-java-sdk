name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # GitHub Packages (Maven registry)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"   # e.g. 1.5.0-sdk.1
          pom_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          java_version="$(grep -oP 'VERSION = "\K[^"]+' src/main/java/net/crawlora/Version.java)"
          if [ "$pom_version" != "$tag" ]; then
            echo "tag $tag != pom version $pom_version" >&2
            exit 1
          fi
          if [ "$java_version" != "$tag" ]; then
            echo "tag $tag != Version.java $java_version" >&2
            exit 1
          fi
      - name: Regenerate and verify
        run: |
          python3 scripts/generate.py
          git diff --exit-code
      - name: Test
        run: mvn -B test
      # GitHub Packages works with the built-in GITHUB_TOKEN — no external
      # account needed. The central-publishing plugin is confined to the
      # `release` profile, so a plain `deploy` only targets GitHub Packages.
      - name: Publish to GitHub Packages
        run: >
          mvn -B -DskipTests deploy
          -s .github/settings.xml
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/Crawlora-org/crawlora-java-sdk
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Maven Central publication is opt-in: provide the MAVEN_CENTRAL_* and
      # MAVEN_GPG_* secrets, then set repository variable PUBLISH_CENTRAL=true.
      # Until then this step is skipped so the release stays green.
      - name: Publish to Maven Central
        if: ${{ vars.PUBLISH_CENTRAL == 'true' }}
        run: mvn -B -P release -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
